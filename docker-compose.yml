services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.4
    container_name: crowdsec-mailcow
    restart: always
    environment:
      COLLECTIONS: >
        crowdsecurity/nginx
        crowdsecurity/base-http-scenarios
        crowdsecurity/dovecot
        crowdsecurity/postfix
        crowdsecurity/sshd
      # Optional: enroll with CrowdSec Central API
      # ENROLL_KEY: "${CROWDSEC_ENROLL_KEY}"
      # ENROLL_INSTANCE_NAME: "${CROWDSEC_INSTANCE_NAME}"
      TZ: "${TZ:-Europe/Berlin}"
    volumes:
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - ./acquis.yaml:/etc/crowdsec/acquis.yaml:ro
    networks:
      - crowdsec-net
      - mailcow-network
    ports:
      - "127.0.0.1:8082:8080"
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  crowdsec-firewall-bouncer:
    image: crowdsecurity/crowdsec-firewall-bouncer:v0.0.31
    container_name: crowdsec-firewall-bouncer
    restart: always
    network_mode: host
    environment:
      CROWDSEC_LAPI_URL: "http://127.0.0.1:8082"
      CROWDSEC_LAPI_KEY: "${CROWDSEC_FIREWALL_BOUNCER_KEY}"
      TZ: "${TZ:-Europe/Berlin}"
      IPTABLES_CHAINS: "INPUT,FORWARD"
      # For nftables-based systems, uncomment the following:
      # MODE: nftables
    volumes:
      - firewall-bouncer-config:/etc/crowdsec/bouncers/
    depends_on:
      crowdsec:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL

networks:
  crowdsec-net:
    driver: bridge
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network

volumes:
  crowdsec-db:
  crowdsec-config:
  firewall-bouncer-config:
