# Mailcow Nginx (webmail, admin UI)
source: docker
container_name:
  - mailcowdockerized-nginx-mailcow-1
labels:
  type: nginx

---
# Dovecot (IMAP/POP3)
source: docker
container_name:
  - mailcowdockerized-dovecot-mailcow-1
labels:
  type: dovecot

---
# Postfix (SMTP)
source: docker
container_name:
  - mailcowdockerized-postfix-mailcow-1
labels:
  type: postfix

---
# Rspamd (spam filter)
# Note: No official CrowdSec parser exists for Rspamd.
# These logs will appear as "unparsed" in metrics — this is expected.
# Kept here for future parser support and log visibility.
source: docker
container_name:
  - mailcowdockerized-rspamd-mailcow-1
labels:
  type: rspamd

---
# SOGo (groupware/webmail)
# Note: No official CrowdSec parser exists for SOGo.
# Same as Rspamd — kept for completeness, logs will be unparsed.
source: docker
container_name:
  - mailcowdockerized-sogo-mailcow-1
labels:
  type: sogo

---
# SSH auth logs
filenames:
  - /var/log/auth.log
labels:
  type: syslog
